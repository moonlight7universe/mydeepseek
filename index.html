<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>DeepSeek Mobile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    /* 侧边栏 */
    .sidebar {
      width: 280px;
      background: #f7f7f8;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e5e5e5;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 20;
      transition: transform 0.25s ease;
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-header {
      padding: 16px;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #555;
    }
    .new-chat-btn {
      margin: 0 16px 12px;
      padding: 10px;
      border: 1px solid #d9d9e3;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    .conversation-item {
      padding: 12px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .conversation-item.active {
      background: #e6e6e6;
    }
    .conversation-item .delete-btn {
      visibility: hidden;
      background: none;
      border: none;
      color: #999;
      font-size: 16px;
      cursor: pointer;
    }
    .conversation-item:hover .delete-btn,
    .conversation-item.active .delete-btn {
      visibility: visible;
    }
    /* 主聊天区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      background: #fff;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
      background: #fff;
      z-index: 10;
    }
    .top-bar .menu-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }
    .balance {
      font-size: 13px;
      color: #666;
      background: #f0f0f0;
      padding: 4px 10px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: 160px; /* 为底部输入区留空间 */
      -webkit-overflow-scrolling: touch;
    }
    .message {
      display: flex;
      margin-bottom: 20px;
      animation: fadeIn 0.2s;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #e8f0fe;
      color: #1a1a1a;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: #f1f1f1;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .edit-msg-btn {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 12px;
      display: none;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    .message.user:hover .edit-msg-btn {
      display: flex;
    }
    /* 移动端长按也可触发，用js处理 */
    .thinking-badge {
      background: #f0e68c;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      color: #5a4a00;
      margin-bottom: 6px;
      display: inline-block;
    }
    /* 底部输入区 */
    .bottom-area {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #eee;
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .controls select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 40px 10px 12px;
      font-size: 15px;
      line-height: 1.4;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      background: #f9fafb;
    }
    .input-row .send-btn {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 15;
      display: none;
    }
    .overlay.show {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .markdown code {
      background: #e8e8e8;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .markdown pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>对话列表</span>
      <button id="closeSidebar">✕</button>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <span>＋</span> 新对话
    </button>
    <div class="conversation-list" id="conversationList"></div>
  </div>

  <!-- 主界面 -->
  <div class="main">
    <div class="top-bar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="balance" id="balanceDisplay">余额加载中...</div>
    </div>
    <div class="messages" id="messagesContainer"></div>
    <div class="bottom-area" id="bottomArea">
      <div class="controls">
        <label>
          <input type="checkbox" id="deepThinkCheck"> 深度思考
        </label>
        <select id="modelSelect">
          <option value="deepseek-chat">DeepSeek-V3</option>
          <option value="deepseek-reasoner">DeepSeek-R1</option>
        </select>
      </div>
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 获取API Key
      let apiKey = localStorage.getItem('ds_api_key');
      if (!apiKey) {
        apiKey = prompt('请输入你的 DeepSeek API Key：');
        if (apiKey) {
          localStorage.setItem('ds_api_key', apiKey);
        } else {
          alert('需要API Key才能使用');
        }
      }

      // 状态管理
      let conversations = JSON.parse(localStorage.getItem('ds_conversations') || '[]');
      let currentConvId = localStorage.getItem('ds_current_conv') || null;
      let isStreaming = false;

      // DOM元素
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const menuBtn = document.getElementById('menuBtn');
      const closeSidebar = document.getElementById('closeSidebar');
      const newChatBtn = document.getElementById('newChatBtn');
      const conversationList = document.getElementById('conversationList');
      const messagesContainer = document.getElementById('messagesContainer');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const deepThinkCheck = document.getElementById('deepThinkCheck');
      const modelSelect = document.getElementById('modelSelect');
      const balanceDisplay = document.getElementById('balanceDisplay');

      // 辅助函数
      function saveData() {
        localStorage.setItem('ds_conversations', JSON.stringify(conversations));
        localStorage.setItem('ds_current_conv', currentConvId);
      }

      function getCurrentConv() {
        return conversations.find(c => c.id === currentConvId) || null;
      }

      function createConversation() {
        const id = Date.now().toString();
        const conv = {
          id,
          title: '新对话',
          model: modelSelect.value,
          messages: []
        };
        conversations.unshift(conv);
        currentConvId = id;
        saveData();
        renderSidebar();
        renderMessages();
        return conv;
      }

      function deleteConversation(id) {
        conversations = conversations.filter(c => c.id !== id);
        if (currentConvId === id) {
          currentConvId = conversations.length > 0 ? conversations[0].id : null;
        }
        saveData();
        renderSidebar();
        renderMessages();
      }

      // 余额查询
      async function fetchBalance() {
        if (!apiKey) return;
        try {
          const res = await fetch('https://api.deepseek.com/user/balance', {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          });
          const data = await res.json();
          if (data.is_available && data.balance_infos) {
            const balance = data.balance_infos[0]?.total_balance ?? '0.00';
            balanceDisplay.textContent = `💰 ${parseFloat(balance).toFixed(2)}`;
          } else {
            balanceDisplay.textContent = '余额查询失败';
          }
        } catch (e) {
          balanceDisplay.textContent = '余额查询出错';
        }
      }

      // 渲染侧边栏
      function renderSidebar() {
        conversationList.innerHTML = '';
        conversations.forEach(conv => {
          const div = document.createElement('div');
          div.className = 'conversation-item' + (conv.id === currentConvId ? ' active' : '');
          div.innerHTML = `
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${conv.title}</span>
            <button class="delete-btn" data-id="${conv.id}">🗑</button>
          `;
          div.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) return;
            switchConversation(conv.id);
          });
          div.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('确定删除该对话？')) deleteConversation(conv.id);
          });
          conversationList.appendChild(div);
        });
      }

      function switchConversation(id) {
        currentConvId = id;
        saveData();
        renderSidebar();
        renderMessages();
        closeSidebarFn();
      }

      function closeSidebarFn() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      }

      menuBtn.addEventListener('click', () => {
        sidebar.classList.add('open');
        overlay.classList.add('show');
      });
      closeSidebar.addEventListener('click', closeSidebarFn);
      overlay.addEventListener('click', closeSidebarFn);

      newChatBtn.addEventListener('click', () => {
        createConversation();
        closeSidebarFn();
      });

      // 渲染消息
      function renderMessages() {
        messagesContainer.innerHTML = '';
        const conv = getCurrentConv();
        if (!conv || conv.messages.length === 0) {
          messagesContainer.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">开始新对话</div>';
          return;
        }
        conv.messages.forEach((msg, index) => {
          addMessageToDOM(msg, index);
        });
        scrollToBottom();
      }

      function addMessageToDOM(msg, index) {
        const div = document.createElement('div');
        div.className = `message ${msg.role}`;
        div.dataset.index = index;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        // 如果是助手消息且包含思考内容
        if (msg.role === 'assistant' && msg.thinking) {
          const thinkBadge = document.createElement('div');
          thinkBadge.className = 'thinking-badge';
          thinkBadge.textContent = '💭 思考过程';
          thinkBadge.addEventListener('click', () => {
            alert(msg.thinking);
          });
          bubble.appendChild(thinkBadge);
        }
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'markdown';
        contentDiv.innerHTML = simpleMarkdown(msg.content);
        bubble.appendChild(contentDiv);
        
        // 用户消息添加编辑按钮
        if (msg.role === 'user') {
          const editBtn = document.createElement('button');
          editBtn.className = 'edit-msg-btn';
          editBtn.textContent = '✎';
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            editMessage(index);
          });
          bubble.appendChild(editBtn);
          // 长按编辑（移动端）
          bubble.addEventListener('touchstart', function(e) {
            this.longPressTimer = setTimeout(() => {
              editMessage(index);
            }, 600);
          });
          bubble.addEventListener('touchend', function() {
            clearTimeout(this.longPressTimer);
          });
          bubble.addEventListener('touchmove', function() {
            clearTimeout(this.longPressTimer);
          });
        }
        
        div.appendChild(bubble);
        messagesContainer.appendChild(div);
      }

      function editMessage(index) {
        const conv = getCurrentConv();
        if (!conv) return;
        const msg = conv.messages[index];
        const newText = prompt('编辑消息：', msg.content);
        if (newText !== null && newText.trim() !== '') {
          // 截断该消息及之后的所有消息
          conv.messages = conv.messages.slice(0, index);
          // 添加编辑后的用户消息
          conv.messages.push({ role: 'user', content: newText.trim() });
          saveData();
          renderMessages();
          // 触发重新生成回复
          sendMessageToAPI();
        }
      }

      // 简单Markdown解析 (支持代码块、加粗、链接)
      function simpleMarkdown(text) {
        if (!text) return '';
        // 转义HTML
        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // 代码块 ```
        text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        // 行内代码 `
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        // 加粗
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // 链接
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        // 换行
        text = text.replace(/\n/g, '<br>');
        return text;
      }

      function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      // 发送消息
      async function sendMessageToAPI() {
        const conv = getCurrentConv();
        if (!conv || conv.messages.length === 0 || isStreaming) return;
        isStreaming = true;
        sendBtn.disabled = true;
        userInput.disabled = true;

        const lastUserMsg = conv.messages[conv.messages.length - 1];
        if (lastUserMsg.role !== 'user') {
          isStreaming = false;
          return;
        }

        // 更新对话标题（取前20字）
        if (conv.title === '新对话' && lastUserMsg.content) {
          conv.title = lastUserMsg.content.slice(0, 20);
          saveData();
          renderSidebar();
        }

        const useDeepThink = deepThinkCheck.checked && modelSelect.value === 'deepseek-reasoner';
        const requestModel = modelSelect.value;
        
        // 构建请求体
        const messagesPayload = conv.messages.map(m => ({
          role: m.role,
          content: m.content
        }));
        
        const body = {
          model: requestModel,
          messages: messagesPayload,
          stream: true
        };
        if (useDeepThink) {
          body.reasoning_effort = 'medium'; // 可根据需要调整
        }

        // 添加占位助手消息
        const assistantMsg = { role: 'assistant', content: '', thinking: '' };
        conv.messages.push(assistantMsg);
        saveData();
        renderMessages();
        scrollToBottom();

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(body)
          });

          if (!response.ok) {
            const err = await response.text();
            throw new Error(`API错误 ${response.status}: ${err}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const dataStr = line.slice(6).trim();
                if (dataStr === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(dataStr);
                  const delta = parsed.choices[0]?.delta;
                  if (delta) {
                    if (delta.reasoning_content) {
                      assistantMsg.thinking = (assistantMsg.thinking || '') + delta.reasoning_content;
                    }
                    if (delta.content) {
                      assistantMsg.content += delta.content;
                    }
                    // 更新DOM
                    updateAssistantMessage(conv.messages.length - 1, assistantMsg);
                  }
                } catch (e) {}
              }
            }
          }
        } catch (error) {
          assistantMsg.content = `发生错误: ${error.message}`;
          updateAssistantMessage(conv.messages.length - 1, assistantMsg);
        } finally {
          isStreaming = false;
          sendBtn.disabled = false;
          userInput.disabled = false;
          userInput.focus();
          saveData();
          scrollToBottom();
        }
      }

      function updateAssistantMessage(index, msg) {
        const msgDiv = document.querySelector(`.message[data-index="${index}"]`);
        if (msgDiv) {
          const bubble = msgDiv.querySelector('.bubble');
          const contentDiv = bubble.querySelector('.markdown');
          if (contentDiv) {
            contentDiv.innerHTML = simpleMarkdown(msg.content);
          }
          // 更新思考标志
          if (msg.thinking && !bubble.querySelector('.thinking-badge')) {
            const thinkBadge = document.createElement('div');
            thinkBadge.className = 'thinking-badge';
            thinkBadge.textContent = '💭 思考过程';
            thinkBadge.addEventListener('click', () => alert(msg.thinking));
            bubble.insertBefore(thinkBadge, bubble.firstChild);
          }
          scrollToBottom();
        }
      }

      function handleSend() {
        if (isStreaming) return;
        const text = userInput.value.trim();
        if (!text) return;
        let conv = getCurrentConv();
        if (!conv) {
          conv = createConversation();
        }
        conv.messages.push({ role: 'user', content: text });
        userInput.value = '';
        userInput.style.height = 'auto';
        saveData();
        renderMessages();
        sendMessageToAPI();
      }

      sendBtn.addEventListener('click', handleSend);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      // 自动调整输入框高度
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      });

      // 处理软键盘遮挡 (Edge, Android)
      if (window.visualViewport) {
        const bottomArea = document.getElementById('bottomArea');
        window.visualViewport.addEventListener('resize', () => {
          const viewport = window.visualViewport;
          const diff = window.innerHeight - viewport.height - viewport.offsetTop;
          if (diff > 0) {
            bottomArea.style.bottom = diff + 'px';
          } else {
            bottomArea.style.bottom = '0';
          }
        });
        window.visualViewport.addEventListener('scroll', () => {
          const viewport = window.visualViewport;
          const diff = window.innerHeight - viewport.height - viewport.offsetTop;
          if (diff > 0) {
            bottomArea.style.bottom = diff + 'px';
          } else {
            bottomArea.style.bottom = '0';
          }
        });
      }

      // 初始化
      function init() {
        if (!apiKey) {
          balanceDisplay.textContent = '未设置Key';
        } else {
          fetchBalance();
        }
        if (conversations.length === 0) {
          createConversation();
        } else {
          if (!currentConvId || !conversations.find(c => c.id === currentConvId)) {
            currentConvId = conversations[0].id;
          }
        }
        renderSidebar();
        renderMessages();
        // 绑定模型/深度思考变化时更新当前对话模型
        modelSelect.addEventListener('change', () => {
          const conv = getCurrentConv();
          if (conv) {
            conv.model = modelSelect.value;
            saveData();
          }
        });
      }
      init();
    })();
  </script>
</body>
</html>
